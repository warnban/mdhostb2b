# /etc/nginx/sites-available/zynqo.ru
# После правок: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name zynqo.ru www.zynqo.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://zynqo.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zynqo.ru;

    # Certbot заполнит эти пути после: certbot --nginx -d zynqo.ru
    ssl_certificate     /etc/letsencrypt/live/zynqo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zynqo.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.zynqo.ru;

    ssl_certificate     /etc/letsencrypt/live/zynqo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zynqo.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://zynqo.ru$request_uri;
}
