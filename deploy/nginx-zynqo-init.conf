# Шаг 1: до получения SSL-сертификата
# cp deploy/nginx-zynqo-init.conf /etc/nginx/sites-available/zynqo.ru
# nginx -t && systemctl reload nginx
# certbot --nginx -d zynqo.ru -d www.zynqo.ru
#
# Шаг 2 (опционально): после certbot можно подменить на полный конфиг с редиректом www:
# cp deploy/nginx-zynqo.conf /etc/nginx/sites-available/zynqo.ru
# nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name zynqo.ru www.zynqo.ru;

    client_max_body_size 64k;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
